<div class="container">

  <h2>CRUD Contactos</h2>

  <div class="form-card">
    <form (ngSubmit)="guardar()" #formulario="ngForm">

      <div class="form-group">
        <label>Nombre</label>
        <input 
          type="text"
          name="name"
          [(ngModel)]="form.name"
          required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input 
          type="email"
          name="email"
          [(ngModel)]="form.email"
          required>
      </div>

      <div class="form-group">
        <label>Número</label>
        <input 
          type="text"
          name="number"
          [(ngModel)]="form.number"
          required>
      </div>

      <div class="actions form-actions">
        <button pButton type="submit" [disabled]="!formulario.valid">Guardar</button>
        <button type="button" (click)="limpiar()">Nuevo</button>
      </div>

    </form>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Número</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let contacto of contactos">
          <td>{{ contacto.id }}</td>
          <td>{{ contacto.name }}</td>
          <td>{{ contacto.email }}</td>
          <td>{{ contacto.number }}</td>
          <td class="actions">
            <button type="button" (click)="editar(contacto)">Editar</button>
            <button type="button" (click)="eliminar(contacto.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
